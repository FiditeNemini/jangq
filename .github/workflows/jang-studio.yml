# .github/workflows/jang-studio.yml
name: JANG Studio

on:
  push:
    branches: [main]
    paths: ["JANGStudio/**", "jang-tools/**", ".github/workflows/jang-studio.yml"]
    tags: ["jang-studio-v*"]
  pull_request:
    paths: ["JANGStudio/**", "jang-tools/**"]

concurrency:
  group: jang-studio-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build + test on macOS 15
    runs-on: macos-15
    if: ${{ !startsWith(github.ref, 'refs/tags/jang-studio-v') }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip build
          pip install -e jang-tools
          pip install pytest

      - name: Run Python tests
        run: pytest jang-tools/tests -v

      - name: Build jang wheel
        run: (cd jang-tools && python -m build --wheel)

      - name: Assemble Python bundle
        run: cd JANGStudio && Scripts/build-python-bundle.sh

      - name: Generate Xcode project
        run: cd JANGStudio && xcodegen generate

      - name: Run Swift unit tests
        run: |
          cd JANGStudio
          xcodebuild test \
            -project JANGStudio.xcodeproj \
            -scheme JANGStudio \
            -destination 'platform=macOS' \
            -only-testing:JANGStudioTests \
            -resultBundlePath TestResults.xcresult

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults-unit
          path: JANGStudio/TestResults.xcresult

  release:
    name: Build + sign + notarize DMG
    needs: []
    if: startsWith(github.ref, 'refs/tags/jang-studio-v')
    runs-on: macos-15
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with: {python-version: "3.11"}

      - name: Install xcodegen + create-dmg
        run: brew install xcodegen create-dmg

      - name: Import signing cert to keychain
        env:
          CERT_P12_B64: ${{ secrets.APPLE_DEV_ID_CERT_P12 }}
          CERT_PW: ${{ secrets.APPLE_DEV_ID_CERT_PW }}
          KEYCHAIN_PW: build-keychain-pw
        run: |
          echo "$CERT_P12_B64" | base64 -d > cert.p12
          security create-keychain -p "$KEYCHAIN_PW" build.keychain
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PW" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import cert.p12 -k build.keychain -P "$CERT_PW" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" build.keychain
          rm -f cert.p12

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip build
          pip install -e jang-tools

      - name: Build jang wheel
        run: (cd jang-tools && python -m build --wheel)

      - name: Assemble Python bundle
        run: cd JANGStudio && Scripts/build-python-bundle.sh

      - name: Generate Xcode project
        run: cd JANGStudio && xcodegen generate

      - name: Build Release .app
        run: |
          cd JANGStudio
          xcodebuild \
            -project JANGStudio.xcodeproj \
            -scheme JANGStudio \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            clean build

      - name: Sign bundled Python + .app
        env:
          APPLE_DEV_ID_APP: ${{ secrets.APPLE_DEV_ID_APP }}
        run: |
          cd JANGStudio
          Scripts/codesign-runtime.sh build/Build/Products/Release/JANGStudio.app

      - name: Notarize + staple .app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          cd JANGStudio
          Scripts/notarize.sh build/Build/Products/Release/JANGStudio.app

      - name: Create + notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          cd JANGStudio
          create-dmg \
            --volname "JANG Studio" \
            --window-size 500 320 \
            --icon-size 96 \
            --icon "JANGStudio.app" 125 150 \
            --app-drop-link 375 150 \
            JANGStudio.dmg \
            build/Build/Products/Release/JANGStudio.app
          xcrun notarytool submit JANGStudio.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait --timeout 30m
          xcrun stapler staple JANGStudio.dmg

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: JANGStudio/JANGStudio.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true
