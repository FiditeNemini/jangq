# Ralph test-matrix registry.
# For first smoke: only Qwen3-0.6B-Base active. Others marked skip.
#
# Usage per docs/superpowers/specs/2026-04-19-ralph-loop-production-readiness-design.md:
#   tier: 1 = fast (<5 min), 2 = medium, 3 = real (slow)

tiers:
  - tier: 1
    min_ram_gb: 4
    min_free_gb: 10
    max_convert_minutes: 5
    models:
      # --- active ---
      - hf_repo: Qwen/Qwen3-0.6B-Base
        family: dense
        archs: [qwen3]
        approx_gb: 1.2
        has_chat_template: false

      # --- deferred until smoke works ---
      - hf_repo: meta-llama/Llama-3.2-1B-Instruct
        family: dense
        archs: [llama]
        approx_gb: 2.5
        has_chat_template: true
        has_tool_parser: true
        skip: "deferred until first tier-1 smoke passes (Qwen3-0.6B-Base only for now); also needs HF_HUB_TOKEN acceptance"

      - hf_repo: HuggingFaceTB/SmolVLM-256M-Instruct
        family: vl_image
        archs: [idefics3]
        approx_gb: 0.6
        has_chat_template: true
        has_preprocessor_config: true
        skip: "deferred until first tier-1 smoke passes"

  - tier: 2
    min_ram_gb: 16
    min_free_gb: 50
    max_convert_minutes: 20
    models:
      - hf_repo: Qwen/Qwen3-1.7B-Base
        family: dense
        archs: [qwen3]
        approx_gb: 3.4
        skip: "tier 2 not yet active"

      - hf_repo: Qwen/Qwen2-VL-2B-Instruct
        family: vl_image
        archs: [qwen2_vl]
        approx_gb: 4.4
        skip: "tier 2 not yet active"

      - hf_repo: Qwen/Qwen1.5-MoE-A2.7B-Chat
        family: moe
        archs: [qwen2_moe]
        approx_gb: 26
        skip: "tier 2 not yet active"

  - tier: 3
    min_ram_gb: 128
    min_free_gb: 150
    max_convert_minutes: 180
    models:
      - local_path: ~/.cache/huggingface/hub/models--Qwen--Qwen3.6-35B-A3B
        family: moe_hybrid_ssm
        archs: [qwen3_5_moe]
        approx_gb: 67
        has_chat_template: true
        supports_jangtq: true
        skip: "tier 3 manual only"

      - local_path: /Volumes/EricsLLMDrive/MiniMax-M2.7-FP8
        family: moe_mla
        archs: [minimax_m2]
        approx_gb: 214
        has_chat_template: true
        supports_jangtq: true
        has_custom_py: true
