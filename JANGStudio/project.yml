# JANGStudio/project.yml
name: JANGStudio
options:
  deploymentTarget:
    macOS: "15.0"
  bundleIdPrefix: ai.jangq
  xcodeVersion: "16.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
targets:
  JANGStudio:
    type: application
    platform: macOS
    sources:
      - path: JANGStudio
    resources:
      - path: JANGStudio/Resources/Assets.xcassets
        optional: true
    info:
      path: JANGStudio/Resources/Info.plist
      properties:
        CFBundleName: JANG Studio
        CFBundleDisplayName: JANG Studio
        CFBundleIdentifier: ai.jangq.JANGStudio
        LSMinimumSystemVersion: "15.0"
        NSHighResolutionCapable: YES
    entitlements:
      path: JANGStudio/Resources/JANGStudio.entitlements
      properties:
        com.apple.security.cs.allow-jit: false
        com.apple.security.cs.disable-library-validation: true
        com.apple.security.files.user-selected.read-write: true
    dependencies: []
    copyFiles:
      - destination: resources
        subpath: python
        files: [{path: build/python}]
    scheme:
      testTargets: [JANGStudioTests, JANGStudioUITests]
      gatherCoverageData: true
  JANGStudioTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/JANGStudioTests
        excludes:
          - "Fixtures/**"
      - path: Tests/JANGStudioTests/Fixtures/fake_convert.sh
        buildPhase: resources
      - path: Tests/JANGStudioTests/Fixtures/golden_convert_events.jsonl
        buildPhase: resources
      - path: Tests/JANGStudioTests/Fixtures/good_output
        buildPhase: resources
        type: folder
      - path: Tests/JANGStudioTests/Fixtures/broken_output
        buildPhase: resources
        type: folder
    dependencies: [{target: JANGStudio}]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
  JANGStudioUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: Tests/JANGStudioUITests
      - path: Tests/JANGStudioTests/Fixtures/fake_convert.sh
        buildPhase: resources
    dependencies: [{target: JANGStudio}]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        ENABLE_HARDENED_RUNTIME: NO
